services:
  # ============================
  # 基础设施层
  # ============================

  mysql:
    image: mysql:8.0
    container_name: qa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qa_platform}
      MYSQL_USER: ${MYSQL_USER:-qa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qa_pass123}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ai-java-main/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  chromadb:
    image: chromadb/chroma:latest
    container_name: qa-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: qa-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    # GPU 加速（Windows Docker Desktop 通常不支持，Linux 下取消注释）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================
  # 应用服务层
  # ============================

  backend:
    build:
      context: .
      dockerfile: ai-java-main/Dockerfile
    container_name: qa-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-qa_platform}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-qa_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-qa_pass123}
      # AI 模型（云端 API，非本地 Ollama）
      AI_API_KEY: ${AI_API_KEY:-sk-your-api-key-here}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-ada-002}
      # Ollama 本地模型（chat + embedding 均走 Docker 服务名 ollama:11434）
      OLLAMA_CHAT_URL: http://ollama:11434
      OLLAMA_EMBEDDING_URL: http://ollama:11434
      # ChromaDB（Docker 服务名）
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      # 文件上传
      QA_FILE_UPLOAD_DIR: /app/uploads
      # Python 微调服务（Docker 服务名）
      PYTHON_TRAIN_BASE_URL: http://python-train:8002
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build: ./ai-frontend
    container_name: qa-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  python-train:
    build: ./python-train-side
    container_name: qa-python-train
    restart: unless-stopped
    ports:
      - "8002:8002"
    # GPU 支持：取消以下注释并在宿主机安装 nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  mysql-data:
  chroma-data:
  ollama-data:
  uploads-data:
